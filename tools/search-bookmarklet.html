<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜题书签 - 安装说明</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
            margin: 0;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .step {
            margin: 25px 0;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .step h3 {
            color: #667eea;
            margin-top: 0;
        }
        
        .bookmarklet-box {
            background: #f5f5f5;
            border: 2px dashed #999;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin: 20px 0;
        }
        
        .bookmarklet-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            cursor: grab;
        }
        
        .bookmarklet-link:hover {
            transform: scale(1.05);
        }
        
        .note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }
        
        .note strong {
            color: #856404;
        }
        
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: Consolas, monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 不切屏搜题工具</h1>
        
        <div class="note">
            <strong>⚠️ 注意：</strong> 这是一个浏览器书签工具，可以在任何网页（包括考试网站）上使用，不会切屏！
        </div>
        
        <div class="step">
            <h3>第一步：把下面这个按钮拖到浏览器书签栏</h3>
            <div class="bookmarklet-box">
                <a href="javascript:(function(){const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/gh/your-repo/search.js';document.body.appendChild(s);})();" class="bookmarklet-link" draggable="true">
                    📚 党旗飘飘 - 快速搜题
                </a>
            </div>
            <p>💡 <strong>提示：</strong>如果拖拽不行，就右键点击按钮 → "添加书签"</p>
        </div>
        
        <div class="step">
            <h3>第二步：在考试页面使用</h3>
            <p>1. 在考试网站，点击浏览器书签栏的"📚 党旗飘飘 - 快速搜题"</p>
            <p>2. 页面右上角会弹出搜题框</p>
            <p>3. 输入关键词，立即找到答案！</p>
        </div>
        
        <div class="step">
            <h3>或者：直接复制代码手动创建书签</h3>
            <p>1. 右键点击书签栏 → "添加书签"</p>
            <p>2. 名称填：<code>📚 搜题</code></p>
            <p>3. 网址（URL）填下面这一大串代码：</p>
            <textarea id="bookmarklet-code" readonly style="width: 100%; height: 200px; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: Consolas, monospace; font-size: 12px;"></textarea>
            <button onclick="copyCode()" style="margin-top: 10px; padding: 10px 25px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1em;">一键复制代码</button>
        </div>
    </div>

    <script>
        // 完整的书签代码
        const fullCode = `javascript:(function(){
    const css = \`
        #party-search-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 400px;
            max-height: 80vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 999999;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        #party-search-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #party-search-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
        #party-search-input {
            width: 100%;
            padding: 15px;
            border: none;
            border-bottom: 2px solid #eee;
            font-size: 16px;
            outline: none;
        }
        #party-search-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        #party-search-results {
            max-height: 50vh;
            overflow-y: auto;
            padding: 10px;
        }
        .party-result-item {
            padding: 12px;
            margin: 8px 0;
            background: #f8f9ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            font-size: 14px;
        }
        .party-result-q {
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .party-result-a {
            color: #2e7d32;
            font-weight: bold;
        }
        .party-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 5px;
        }
        .party-badge-set {
            background: #667eea;
            color: white;
        }
        .party-badge-type {
            background: #f5576c;
            color: white;
        }
    \`;
    
    const style = document.createElement('style');
    style.textContent = css;
    document.head.appendChild(style);
    
    const box = document.createElement('div');
    box.id = 'party-search-box';
    box.innerHTML = \`
        <div id="party-search-header">
            <span style="font-weight:bold;">📚 党旗飘飘 - 快速搜题</span>
            <button id="party-search-close">×</button>
        </div>
        <input type="text" id="party-search-input" placeholder="输入关键词搜索...">
        <button id="party-search-btn">🔍 搜索</button>
        <div id="party-search-results"></div>
    \`;
    document.body.appendChild(box);
    
    document.getElementById('party-search-close').onclick = function(){
        box.remove();
        style.remove();
    };
    
    // 题目数据
    const questions = [QUESTIONS_DATA_PLACEHOLDER];
    
    function search() {
        const keyword = document.getElementById('party-search-input').value.trim().toLowerCase();
        const container = document.getElementById('party-search-results');
        
        if (!keyword) {
            container.innerHTML = '<p style=\"text-align:center;color:#999;padding:20px;\">请输入关键词</p>';
            return;
        }
        
        let results = questions.filter(q => {
            return q.question.toLowerCase().includes(keyword) || String(q.answer).toLowerCase().includes(keyword);
        });
        
        if (results.length === 0) {
            container.innerHTML = '<p style=\"text-align:center;color:#999;padding:20px;\">未找到相关题目</p>';
            return;
        }
        
        let html = '';
        results.slice(0, 10).forEach(q => {
            let setName = q.set === 1 ? '第一套' : q.set === 2 ? '第二套' : '第三套';
            let typeName = '';
            if (q.type === 'single_choice') typeName = '单选';
            else if (q.type === 'multiple_choice') typeName = '多选';
            else if (q.type === 'true_false') typeName = '判断';
            else if (q.type === 'fill_blank') typeName = '填空';
            
            let answerDisplay = q.type === 'true_false' ? (q.answer ? '正确' : '错误') : q.answer;
            
            html += \`
                <div class="party-result-item">
                    <div>
                        <span class="party-badge party-badge-set">\${setName}</span>
                        <span class="party-badge party-badge-type">\${typeName}</span>
                    </div>
                    <div class="party-result-q">\${q.question}</div>
                    <div class="party-result-a">✅ 答案：\${answerDisplay}</div>
                </div>
            \`;
        });
        
        container.innerHTML = html;
    }
    
    document.getElementById('party-search-btn').onclick = search;
    document.getElementById('party-search-input').addEventListener('keypress', function(e){
        if (e.key === 'Enter') search();
    });
})();`;
        
        document.getElementById('bookmarklet-code').value = fullCode;
        
        function copyCode() {
            document.getElementById('bookmarklet-code').select();
            document.execCommand('copy');
            alert('✅ 代码已复制！');
        }
    </script>
</body>
</html>
