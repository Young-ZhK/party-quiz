<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>党旗飘飘 - 在线答题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
            
            .header p {
                font-size: 1em;
            }
            
            .menu {
                padding: 20px;
                border-radius: 12px;
            }
            
            .menu h2 {
                font-size: 1.3em;
            }
            
            .set-btn {
                padding: 10px 20px;
                font-size: 1em;
            }
            
            .menu-buttons {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
            
            .menu-btn {
                padding: 15px;
                font-size: 1em;
            }
            
            .quiz-container {
                padding: 20px;
            }
            
            .question {
                font-size: 1.1em;
                line-height: 1.8;
            }
            
            .option {
                padding: 15px;
                font-size: 1em;
            }
            
            .show-answer-btn {
                padding: 10px 20px;
                font-size: 0.95em;
            }
            
            .result-container {
                padding: 20px;
            }
            
            .score-display {
                font-size: 3em;
            }
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .menu {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .menu h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .set-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .set-btn {
            padding: 12px 30px;
            border: 3px solid #667eea;
            border-radius: 10px;
            background: white;
            color: #667eea;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .set-btn.active {
            background: #667eea;
            color: white;
        }
        
        .set-btn:hover {
            transform: translateY(-2px);
        }
        
        .menu-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .menu-btn {
            padding: 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-weight: bold;
        }
        
        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .btn-all { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-single { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        .btn-multiple { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .btn-tf { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-fill { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .btn-random { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .btn-browse { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        
        .browse-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        
        .browse-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .browse-title {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }
        
        .browse-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 10px 20px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            background: white;
            color: #667eea;
            font-weight: bold;
        }
        
        .filter-select:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }
        
        .questions-list {
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .browse-question-card {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .browse-question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .browse-question-number {
            font-weight: bold;
            color: #667eea;
            font-size: 1.1em;
        }
        
        .browse-question-badges {
            display: flex;
            gap: 8px;
        }
        
        .browse-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: white;
            font-weight: bold;
        }
        
        .browse-question-text {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .browse-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .browse-option {
            padding: 10px 15px;
            background: white;
            border-radius: 8px;
            font-size: 0.95em;
        }
        
        .browse-option.correct {
            background: #d4edda;
            border-left: 3px solid #38ef7d;
        }
        
        .browse-answer-box {
            background: #fff9e6;
            border: 2px dashed #ffc107;
            border-radius: 8px;
            padding: 15px;
        }
        
        .browse-answer-label {
            font-weight: bold;
            color: #f57c00;
            margin-bottom: 5px;
        }
        
        .browse-answer-text {
            color: #333;
            font-size: 1.05em;
        }
        
        .quiz-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        
        .progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .question-number {
            font-size: 1.2em;
            color: #666;
        }
        
        .question-badges {
            display: flex;
            gap: 10px;
        }
        
        .question-type {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            color: white;
        }
        
        .question-set {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            background: #ff6b6b;
            color: white;
        }
        
        .type-single { background: #11998e; }
        .type-multiple { background: #eb3349; }
        .type-tf { background: #f093fb; }
        .type-fill { background: #4facfe; }
        
        .question {
            font-size: 1.3em;
            color: #333;
            margin: 25px 0;
            line-height: 1.6;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.05em;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f5f5ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .option.correct {
            border-color: #38ef7d;
            background: #d4edda;
            color: #155724;
        }
        
        .option.wrong {
            border-color: #f45c43;
            background: #f8d7da;
            color: #721c24;
        }
        
        .fill-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .fill-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .answer-section {
            background: #fff9e6;
            border: 2px dashed #ffc107;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        
        .answer-section.show {
            display: block;
        }
        
        .answer-title {
            font-weight: bold;
            color: #f57c00;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .answer-content {
            color: #333;
            font-size: 1.1em;
        }
        
        .show-answer-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #333;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .show-answer-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-prev {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-next {
            background: #667eea;
            color: white;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-back {
            background: #e0e0e0;
            color: #333;
        }
        
        .result-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        
        .score-display {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        
        .result-details {
            text-align: left;
            margin-top: 30px;
        }
        
        .result-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }
        
        .result-correct {
            background: #d4edda;
            border-left: 4px solid #38ef7d;
        }
        
        .result-wrong {
            background: #f8d7da;
            border-left: 4px solid #f45c43;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>党旗飘飘</h1>
            <p>入党积极分子发展对象理论测试（共300题）</p>
        </div>
        
        <div id="menu" class="menu">
            <h2>请选择题目集</h2>
            <div class="set-selector">
                <button class="set-btn active" id="set-all" onclick="selectSet('all')">全部题目</button>
                <button class="set-btn" id="set-1" onclick="selectSet('1')">第一套（100题）</button>
                <button class="set-btn" id="set-2" onclick="selectSet('2')">第二套（100题）</button>
                <button class="set-btn" id="set-3" onclick="selectSet('3')">第三套（100题）</button>
            </div>
            
            <h2>选择答题模式</h2>
            <div class="menu-buttons">
                <button class="menu-btn btn-all" onclick="startQuiz('all')">全部题目</button>
                <button class="menu-btn btn-single" onclick="startQuiz('single_choice')">单选题</button>
                <button class="menu-btn btn-multiple" onclick="startQuiz('multiple_choice')">多选题</button>
                <button class="menu-btn btn-tf" onclick="startQuiz('true_false')">判断题</button>
                <button class="menu-btn btn-fill" onclick="startQuiz('fill_blank')">填空题</button>
                <button class="menu-btn btn-random" onclick="startQuiz('random')">随机10题</button>
            </div>
            
            <h2 style="margin-top: 30px;">其他功能</h2>
            <div class="menu-buttons">
                <button class="menu-btn btn-browse" onclick="startBrowse()">浏览题目和答案</button>
            </div>
        </div>
        
        <div id="quiz" class="quiz-container">
            <div class="progress">
                <span class="question-number" id="q-number">第 1 题 / 共 100 题</span>
                <div class="question-badges">
                    <span class="question-set" id="q-set">第一套</span>
                    <span class="question-type" id="q-type">单选题</span>
                </div>
            </div>
            <div class="question" id="q-text"></div>
            <div class="options" id="options"></div>
            
            <button class="show-answer-btn" id="show-answer-btn" onclick="toggleAnswer()">显示答案</button>
            
            <div class="answer-section" id="answer-section">
                <div class="answer-title">正确答案</div>
                <div class="answer-content" id="answer-content"></div>
            </div>
            
            <div class="nav-buttons">
                <button class="nav-btn btn-prev" id="btn-prev" onclick="prevQuestion()">上一题</button>
                <button class="nav-btn btn-next" id="btn-next" onclick="nextQuestion()">下一题</button>
                <button class="nav-btn btn-submit hidden" id="btn-submit" onclick="submitQuiz()">提交答案</button>
            </div>
            <div style="margin-top: 20px;">
                <button class="nav-btn btn-back" onclick="backToMenu()">返回菜单</button>
            </div>
        </div>
        
        <div id="results" class="result-container">
            <h2>答题完成！</h2>
            <div class="score-display" id="score-display">0/100</div>
            <p style="font-size: 1.2em; color: #666;" id="score-text"></p>
            <div class="result-details" id="result-details"></div>
            <div style="margin-top: 30px;">
                <button class="nav-btn btn-back" onclick="backToMenu()">返回菜单</button>
                <button class="nav-btn btn-submit" onclick="restartQuiz()">再来一次</button>
            </div>
        </div>
        
        <div id="browse" class="browse-container">
            <div class="browse-header">
                <div class="browse-title">题目浏览</div>
                <div class="browse-filters">
                    <select class="filter-select" id="browse-set-filter" onchange="filterBrowseQuestions()">
                        <option value="all">全部题目集</option>
                        <option value="1">第一套</option>
                        <option value="2">第二套</option>
                        <option value="3">第三套</option>
                    </select>
                    <select class="filter-select" id="browse-type-filter" onchange="filterBrowseQuestions()">
                        <option value="all">全部题型</option>
                        <option value="single_choice">单选题</option>
                        <option value="multiple_choice">多选题</option>
                        <option value="true_false">判断题</option>
                        <option value="fill_blank">填空题</option>
                    </select>
                </div>
            </div>
            <div class="questions-list" id="questions-list"></div>
            <div style="margin-top: 20px;">
                <button class="nav-btn btn-back" onclick="backToMenu()">返回菜单</button>
            </div>
        </div>
    </div>

    <script>
        let questions = [];
        let allQuestionsData = [];
        let currentIndex = 0;
        let userAnswers = {};
        let currentQuizType = 'all';
        let currentSet = 'all';
        let answerShown = false;

        const API_BASE = '/api';

        function selectSet(set) {
            currentSet = set;
            document.querySelectorAll('.set-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('set-' + set).classList.add('active');
        }

        function toggleAnswer() {
            const q = questions[currentIndex];
            const answerSection = document.getElementById('answer-section');
            const showAnswerBtn = document.getElementById('show-answer-btn');
            
            if (answerShown) {
                answerSection.classList.remove('show');
                showAnswerBtn.textContent = '显示答案';
                answerShown = false;
            } else {
                let answerText = '';
                
                if (q.type === 'true_false') {
                    answerText = q.answer ? '正确' : '错误';
                } else if (q.type === 'fill_blank') {
                    answerText = q.answer;
                } else {
                    answerText = q.answer;
                }
                
                document.getElementById('answer-content').textContent = answerText;
                answerSection.classList.add('show');
                showAnswerBtn.textContent = '隐藏答案';
                answerShown = true;
            }
        }

        async function startQuiz(type) {
            currentQuizType = type;
            currentIndex = 0;
            userAnswers = {};
            
            document.getElementById('menu').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('browse').style.display = 'none';
            
            let url;
            if (type === 'random') {
                url = API_BASE + '/random?count=10&set=' + currentSet;
            } else {
                url = API_BASE + '/questions?type=' + type + '&set=' + currentSet;
            }
            
            const response = await fetch(url);
            questions = await response.json();
            
            displayQuestion();
        }

        function displayQuestion() {
            const q = questions[currentIndex];
            
            answerShown = false;
            document.getElementById('answer-section').classList.remove('show');
            document.getElementById('show-answer-btn').textContent = '显示答案';
            
            document.getElementById('q-number').textContent = '第 ' + (currentIndex + 1) + ' 题 / 共 ' + questions.length + ' 题';
            
            const typeNames = {
                'single_choice': '单选题',
                'multiple_choice': '多选题',
                'true_false': '判断题',
                'fill_blank': '填空题'
            };
            
            const typeClass = {
                'single_choice': 'type-single',
                'multiple_choice': 'type-multiple',
                'true_false': 'type-tf',
                'fill_blank': 'type-fill'
            };
            
            const typeEl = document.getElementById('q-type');
            typeEl.textContent = typeNames[q.type];
            typeEl.className = 'question-type ' + typeClass[q.type];
            
            const setEl = document.getElementById('q-set');
            setEl.textContent = q.set ? '第' + q.set + '套' : '题目';
            
            document.getElementById('q-text').textContent = q.question;
            
            const optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            
            const qId = q.uid || q.id;
            
            if (q.type === 'fill_blank') {
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'fill-input';
                input.placeholder = '请输入答案...';
                input.value = userAnswers[qId] || '';
                input.oninput = function(e) { userAnswers[qId] = e.target.value; };
                optionsEl.appendChild(input);
                
                const checkBtn = document.createElement('button');
                checkBtn.className = 'show-answer-btn';
                checkBtn.textContent = '检查答案';
                checkBtn.style.marginTop = '10px';
                checkBtn.onclick = function() {
                    checkFillAnswer(qId, input, q, optionsEl);
                };
                optionsEl.appendChild(checkBtn);
                
                const feedback = document.createElement('div');
                feedback.id = 'fill-feedback-' + qId;
                feedback.style.marginTop = '10px';
                feedback.style.padding = '10px';
                feedback.style.borderRadius = '8px';
                feedback.style.display = 'none';
                optionsEl.appendChild(feedback);
            } else if (q.type === 'true_false') {
                ['正确', '错误'].forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.textContent = opt;
                    const val = i === 0;
                    if (userAnswers[qId] === val) {
                        div.classList.add('selected');
                    }
                    div.onclick = function() { selectOption(qId, val, div); };
                    optionsEl.appendChild(div);
                });
            } else {
                const labels = ['A', 'B', 'C', 'D'];
                q.options.forEach((opt, i) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.textContent = labels[i] + '. ' + opt;
                    if (userAnswers[qId] === labels[i]) {
                        div.classList.add('selected');
                    }
                    div.onclick = function() { selectOption(qId, labels[i], div); };
                    optionsEl.appendChild(div);
                });
            }
            
            document.getElementById('btn-prev').style.display = currentIndex > 0 ? 'block' : 'none';
            
            if (currentIndex === questions.length - 1) {
                document.getElementById('btn-next').style.display = 'none';
                document.getElementById('btn-submit').style.display = 'block';
            } else {
                document.getElementById('btn-next').style.display = 'block';
                document.getElementById('btn-submit').style.display = 'none';
            }
        }

        function selectOption(qId, value, el) {
            userAnswers[qId] = value;
            const q = questions[currentIndex];
            
            const siblings = el.parentElement.children;
            for (let sibling of siblings) {
                sibling.classList.remove('selected', 'correct', 'wrong');
            }
            el.classList.add('selected');
            
            let isCorrect = false;
            if (q.type === 'true_false') {
                isCorrect = (value === true && q.answer === true) || (value === false && q.answer === false);
            } else {
                isCorrect = value.toUpperCase() === String(q.answer).toUpperCase();
            }
            
            if (isCorrect) {
                el.classList.remove('selected');
                el.classList.add('correct');
            } else {
                el.classList.remove('selected');
                el.classList.add('wrong');
                showCorrectAnswer(q, el.parentElement);
            }
        }
        
        function showCorrectAnswer(q, optionsContainer) {
            if (q.type === 'true_false') {
                const options = optionsContainer.children;
                const correctIndex = q.answer ? 0 : 1;
                if (options[correctIndex]) {
                    options[correctIndex].classList.add('correct');
                }
            } else {
                const labels = ['A', 'B', 'C', 'D'];
                const answerStr = String(q.answer).toUpperCase();
                const options = optionsContainer.children;
                for (let i = 0; i < options.length; i++) {
                    if (answerStr.includes(labels[i])) {
                        options[i].classList.add('correct');
                    }
                }
            }
        }
        
        function checkFillAnswer(qId, input, q, container) {
            const feedback = document.getElementById('fill-feedback-' + qId);
            const userAnswer = input.value.trim();
            const correctAnswer = String(q.answer || '').trim();
            
            const isCorrect = userAnswer === correctAnswer;
            
            feedback.style.display = 'block';
            if (isCorrect) {
                feedback.style.background = '#d4edda';
                feedback.style.color = '#155724';
                feedback.innerHTML = '✅ 回答正确！';
                input.style.borderColor = '#38ef7d';
            } else {
                feedback.style.background = '#f8d7da';
                feedback.style.color = '#721c24';
                feedback.innerHTML = '❌ 回答错误！正确答案是：<strong>' + correctAnswer + '</strong>';
                input.style.borderColor = '#f45c43';
            }
        }

        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                displayQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                displayQuestion();
            }
        }

        async function submitQuiz() {
            const response = await fetch(API_BASE + '/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ answers: userAnswers })
            });
            
            const result = await response.json();
            showResults(result);
        }

        function showResults(result) {
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            document.getElementById('score-display').textContent = result.score + '/' + result.total;
            
            const percentage = Math.round((result.score / result.total) * 100);
            let text = '';
            if (percentage >= 90) text = '太棒了！成绩优秀！';
            else if (percentage >= 70) text = '不错！继续努力！';
            else if (percentage >= 60) text = '及格了，但还需要加强！';
            else text = '需要多练习哦！';
            document.getElementById('score-text').textContent = text;
            
            const detailsEl = document.getElementById('result-details');
            detailsEl.innerHTML = '<h3 style="margin-bottom: 15px;">答题详情</h3>';
            
            result.results.forEach((res, index) => {
                const q = questions.find(x => (x.uid || x.id) === res.id);
                const div = document.createElement('div');
                div.className = 'result-item ' + (res.correct ? 'result-correct' : 'result-wrong');
                div.innerHTML = '<strong>第 ' + (index + 1) + ' 题（第' + res.set + '套）</strong>' + q.question + '<br><em>你的答案：' + (res.user_answer || '未作答') + ' | 正确答案：' + res.correct_answer + '</em>';
                detailsEl.appendChild(div);
            });
        }

        function backToMenu() {
            document.getElementById('menu').style.display = 'block';
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('browse').style.display = 'none';
        }

        function restartQuiz() {
            startQuiz(currentQuizType);
        }

        async function startBrowse() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('browse').style.display = 'block';
            
            const response = await fetch(API_BASE + '/questions?type=all');
            allQuestionsData = await response.json();
            
            filterBrowseQuestions();
        }

        function filterBrowseQuestions() {
            const setFilter = document.getElementById('browse-set-filter').value;
            const typeFilter = document.getElementById('browse-type-filter').value;
            
            let filtered = allQuestionsData;
            
            if (setFilter !== 'all') {
                filtered = filtered.filter(q => q.set == setFilter);
            }
            
            if (typeFilter !== 'all') {
                filtered = filtered.filter(q => q.type === typeFilter);
            }
            
            renderBrowseQuestions(filtered);
        }

        function renderBrowseQuestions(questionsToRender) {
            const listEl = document.getElementById('questions-list');
            listEl.innerHTML = '';
            
            if (questionsToRender.length === 0) {
                listEl.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">没有找到符合条件的题目</div>';
                return;
            }
            
            const typeNames = {
                'single_choice': '单选题',
                'multiple_choice': '多选题',
                'true_false': '判断题',
                'fill_blank': '填空题'
            };
            
            const typeColors = {
                'single_choice': '#11998e',
                'multiple_choice': '#eb3349',
                'true_false': '#f093fb',
                'fill_blank': '#4facfe'
            };
            
            questionsToRender.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'browse-question-card';
                
                let answerText = '';
                if (q.type === 'true_false') {
                    answerText = q.answer ? '正确' : '错误';
                } else if (q.type === 'fill_blank') {
                    answerText = q.answer;
                } else {
                    answerText = q.answer;
                }
                
                let optionsHtml = '';
                if (q.type !== 'fill_blank' && q.options && q.options.length > 0) {
                    const labels = ['A', 'B', 'C', 'D'];
                    optionsHtml = '<div class="browse-options">';
                    q.options.forEach((opt, i) => {
                        const isCorrect = q.type !== 'true_false' ? 
                            (q.answer || '').includes(labels[i]) :
                            (i === 0 && q.answer) || (i === 1 && !q.answer);
                        optionsHtml += '<div class="browse-option ' + (isCorrect ? 'correct' : '') + '">' + labels[i] + '. ' + opt + '</div>';
                    });
                    optionsHtml += '</div>';
                } else if (q.type === 'true_false') {
                    optionsHtml = '<div class="browse-options">';
                    optionsHtml += '<div class="browse-option ' + (q.answer ? 'correct' : '') + '">正确</div>';
                    optionsHtml += '<div class="browse-option ' + (!q.answer ? 'correct' : '') + '">错误</div>';
                    optionsHtml += '</div>';
                }
                
                card.innerHTML = '<div class="browse-question-header"><div class="browse-question-number">第 ' + (index + 1) + ' 题（第' + q.set + '套 原编号' + q.id + '）</div><div class="browse-question-badges"><span class="browse-badge" style="background: ' + typeColors[q.type] + '">' + typeNames[q.type] + '</span></div></div><div class="browse-question-text">' + q.question + '</div>' + optionsHtml + '<div class="browse-answer-box"><div class="browse-answer-label">正确答案</div><div class="browse-answer-text">' + answerText + '</div></div>';
                
                listEl.appendChild(card);
            });
        }
    </script>
</body>
</html>
